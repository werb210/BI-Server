# BI_BOOT_FIX_v64_WORKFLOW — pruned package, build metadata, /health
# probe, and Windows iisnode config (server.js + web.config). NO
# startup-command — that's incompatible with publish-profile auth and
# Windows web apps.
name: Build and deploy Node.js app to Azure Web App - BI-Server

on:
  # BI_SERVER_BLOCK_v412_DEPLOY_MANUAL_ONLY — auto-deploy on merge removed so a
  # broken change can no longer reach production automatically. Trigger deploys
  # manually (Actions tab -> this workflow -> Run workflow). The deploy targets
  # the staging slot (per the publish-profile secret); promote to production
  # with a manual Swap in the Azure portal after verifying staging is healthy.
  workflow_dispatch:
concurrency:
  group: bi-server-staging
  cancel-in-progress: true

env:
  # BI_SERVER_BLOCK_v189_PROBE_FQDN_AND_NON_FATAL_v1
  AZURE_WEBAPP_NAME: BI-Server
  AZURE_WEBAPP_HOSTNAME: bi-server-cse0apamgkheb9d5.canadacentral-01.azurewebsites.net
  NODE_VERSION: '20.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install all dependencies (build needs devDeps)
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build app
        run: npm run build

      - name: Verify build artifacts
        run: |
          test -f dist/index.js || { echo "::error::dist/index.js missing"; exit 1; }
          test -f dist/server.js || { echo "::error::dist/server.js missing"; exit 1; }
          test -f server.js     || { echo "::error::server.js (iisnode shim) missing at root"; exit 1; }
          test -f web.config    || { echo "::error::web.config missing at root"; exit 1; }
          echo "dist/ contents:" && ls -la dist | head -30

      - name: Copy SQL migrations into dist
        run: |
          mkdir -p dist/db/migrations
          cp -R src/db/migrations/. dist/db/migrations/ 2>/dev/null || true
          ls -la dist/db/migrations | head -10 || true

      - name: Stamp build metadata
        run: |
          BUILD_TAG="v64-$(date -u +%Y%m%d%H%M%S)"
          COMMIT_SHA="${GITHUB_SHA:0:8}"
          echo "BUILD_TAG=$BUILD_TAG" >> $GITHUB_ENV
          echo "COMMIT_SHA=$COMMIT_SHA" >> $GITHUB_ENV
          echo "build_tag=$BUILD_TAG" > BUILD_META
          echo "commit_sha=$COMMIT_SHA" >> BUILD_META
          cat BUILD_META

      - name: Strip dev dependencies for runtime
        run: npm prune --omit=dev

      - name: Stage deploy package (slim)
        run: |
          mkdir -p _deploy
          cp -R dist          _deploy/dist
          cp -R node_modules  _deploy/node_modules
          cp package.json package-lock.json _deploy/
          cp server.js   _deploy/   # iisnode entrypoint shim
          cp web.config  _deploy/   # iisnode rewrite rules
          [ -f BUILD_META ] && cp BUILD_META _deploy/
          du -sh _deploy

      - name: Prevent parallel Azure publishes
        run: |
          echo "Checking deployment serialization..."

      - name: Wait for previous deployment lock release
        run: sleep 45

      - name: Deploy to Azure Web App (staging slot)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          # IMPORTANT: this secret must hold the STAGING SLOT's publish
          # profile (not the production app's). Manual workflow runs deploy
          # to the staging slot only; production is updated by a manual Swap in
          # the Azure portal once the slot is verified healthy.
          # BI_SERVER_BLOCK_v414_DEPLOY_USES_STAGING_SECRET — deploy to the staging slot
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_STAGING }}
          package: .
          # NOTE: NO startup-command. Windows web apps + publish-profile
          # auth reject this input. iisnode finds server.js automatically.

      - name: Post-deploy /health probe
        # BI_SERVER_BLOCK_v189_PROBE_FQDN_AND_NON_FATAL_v1
        # Smoke test only. The deploy step is the source of truth.
        # Probe failure must NOT fail the workflow — Azure cold-start
        # plus DB warmup can exceed 5 minutes on the smaller plan.
        continue-on-error: true
        run: |
          HOST="${{ env.AZURE_WEBAPP_HOSTNAME }}"
          echo "probe target: https://$HOST/health"
          for i in $(seq 1 30); do
            sleep 10
            HTTP=$(curl -s -m 10 -o /tmp/h.txt -w "%{http_code}" "https://$HOST/health" || echo "000")
            echo "attempt $i http=$HTTP"
            if [ "$HTTP" = "200" ]; then
              cat /tmp/h.txt 2>/dev/null || true
              echo
              exit 0
            fi
          done
          echo "::warning::BI-Server /health did not return 200 within 5 minutes after deploy."
          echo "Last response body (if any):"
          cat /tmp/h.txt 2>/dev/null || true
          # Exit 0 — continue-on-error already protects the workflow,
          # but also being explicit so the step itself is green when
          # the probe times out. The deploy already happened.
          exit 0
